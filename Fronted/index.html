<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Smart Task Manager</h1>
    <p class="subtitle">Connects directly with your FastAPI backend</p>

    <section class="card">
        <h2>API Configuration</h2>
        <label for="apiBase">Backend Base URL</label>
        <input id="apiBase" placeholder="https://your-api.onrender.com">
        <button id="saveApiBtn">Save API URL</button>
    </section>

    <section class="card grid-two">
        <div>
            <h2>Register</h2>
            <input id="reg_email" placeholder="Email" type="email">
            <input id="reg_password" placeholder="Password" type="password">
            <button id="registerBtn">Register</button>
        </div>

        <div>
            <h2>Login</h2>
            <input id="login_email" placeholder="Email" type="email">
            <input id="login_password" placeholder="Password" type="password">
            <button id="loginBtn">Login</button>
            <p id="authStatus" class="muted">Not logged in</p>
        </div>
    </section>

    <section class="card">
        <h2>Create Task</h2>
        <input id="title" placeholder="Task title">

        <div class="grid-two">
            <select id="priority">
                <option value="">No priority</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <input id="deadline" type="date">
        </div>

        <label class="checkbox">
            <input id="completed" type="checkbox">
            Mark as completed
        </label>

        <button id="createTaskBtn">Create Task</button>
    </section>

    <section class="card">
        <h2>Your Tasks</h2>
        <div class="actions">
            <button id="loadTasksBtn">Load Tasks</button>
        </div>

        <ul id="taskList"></ul>
    </section>

    <p id="message" class="message"></p>
</div>

<script src="script.js"></script>
</body>
</html>
